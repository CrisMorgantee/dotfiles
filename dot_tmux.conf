##### CORE / COLORS #####
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"
set -g focus-events on

# Let tmux talk to the system clipboard when possible
set -g set-clipboard on

# OSC52: enables remote->local clipboard (needs terminal support)
# (Warp usually supports OSC52; if not, we'll fall back)
set -ga terminal-overrides ",*:Ms=\E]52;c;%p1%s\007"

##### USABILITY / PERF #####
set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
setw -g aggressive-resize on
setw -g mode-keys vi

##### PREFIX #####
# keep default C-b

##### SPLITS #####
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

##### PANE NAVIGATION (hjkl WITHOUT prefix) #####
# Use Ctrl+h/j/k/l to avoid stealing plain h/j/k/l from apps (nvim etc.)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

##### PANE RESIZE (WITH prefix, repeatable) #####
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### COPY MODE -> macOS clipboard (LOCAL tmux) #####
# Use full path to avoid PATH inheritance issues
bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "/usr/bin/pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "/usr/bin/pbcopy"

##### STATUS (content minimal; theme sets colors) #####
set -g status on
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 120
set -g status-left  "#S "
set -g status-right "%Y-%m-%d %H:%M "

##### TPM + PLUGINS (maintained) #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'nordtheme/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'

# tmux-yank: prefer OSC52 when remote; pbcopy when local
set -g @yank_action 'copy-pipe'
set -g @yank_selection 'clipboard'

##### RELOAD #####
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

run '~/.tmux/plugins/tpm/tpm'