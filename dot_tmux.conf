##### TERMINAL / COLORS (Nord + Truecolor) #####
# Best default today. If a remote host lacks terminfo, install ncurses-term or fallback to screen-256color.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"
set -g focus-events on

##### USABILITY #####
set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
setw -g aggressive-resize on

##### KEEP DEFAULT PREFIX #####
# prefix remains C-b (default)
# bind C-b send-prefix  # (not needed unless you rebind)

##### SPLITS (consistent) #####
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

##### PANE NAVIGATION (hjkl WITHOUT prefix) #####
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

##### PANE RESIZE (WITH prefix, repeatable) #####
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### COPY MODE + macOS CLIPBOARD #####
setw -g mode-keys vi
# Enter/y copies to system clipboard and exits copy-mode
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "pbcopy"

##### STATUS (lightweight) #####
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-left-length 40
set -g status-right-length 120
set -g status-left  "#S "
set -g status-right "%Y-%m-%d %H:%M "

##### QUICK RELOAD #####
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"